<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe | Player vs AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Tic-Tac-Toe</h1>
        <p class="subtitle">You are <span class="x-color">X</span> | AI is <span class="o-color">O</span></p>
        
        <div class="game-board" id="gameBoard">
            <!-- 9 cells will be generated by JavaScript -->
        </div>
        
        <div class="status" id="statusMessage">
            Your turn!
        </div>
        
        <button class="reset-btn" id="resetBtn">New Game</button>
        
        <div class="scoreboard">
            <div class="score">
                <span class="x-color">You (X)</span>
                <span id="playerScore">0</span>
            </div>
            <div class="score">
                <span class="o-color">AI (O)</span>
                <span id="aiScore">0</span>
            </div>
            <div class="score">
                <span>Ties</span>
                <span id="tieScore">0</span>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
